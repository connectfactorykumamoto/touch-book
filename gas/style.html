<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  background:#f4f4f4;

  font-family:
  -apple-system,
  BlinkMacSystemFont,
  "Hiragino Sans",
  "Yu Gothic",
  sans-serif;

  color:#333;

}

.container{

  width:100%;

  max-width:800px;

  margin:auto;

  padding:20px;

}

.card{

  background:#fff;

  border-radius:15px;

  box-shadow:
  0 5px 15px rgba(0,0,0,.15);

  padding:20px;

}

h1{

  text-align:center;

  font-size:30px;

  margin-bottom:20px;

}

#loading{

  text-align:center;

  color:#666;

  padding:30px;

}

#error{

  color:red;

  text-align:center;

  margin-bottom:15px;

}

#image{

  width:100%;

  border-radius:10px;

  display:block;

  margin:auto;

}

#text{

  margin-top:20px;

  font-size:24px;

  line-height:1.8;

  white-space:pre-wrap;

}

audio{

  width:100%;

  margin-top:25px;

}

.buttons{

  display:flex;

  justify-content:space-between;

  gap:15px;

  margin-top:30px;

}

button{

  flex:1;

  height:55px;

  border:none;

  border-radius:10px;

  background:#1976D2;

  color:#fff;

  font-size:20px;

  cursor:pointer;

  transition:.2s;

}

button:hover{

  background:#1565C0;

}

button:disabled{

  background:#999;

}

#pageLabel{

  text-align:center;

  margin-top:20px;

  font-size:18px;

  color:#666;

}

/* iPhone */

@media(max-width:600px){

h1{

  font-size:24px;

}

#text{

  font-size:20px;

}

button{

  font-size:18px;

  height:50px;

}

}

</style>
